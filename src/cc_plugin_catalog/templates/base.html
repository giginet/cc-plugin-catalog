<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ marketplace.name }}{% endblock %}</title>
    <link rel="stylesheet" href="{% block css_path %}static/style.css{% endblock %}">
</head>
<body data-theme="light">
    <header class="site-header">
        <div class="header-inner">
            <a href="{% block home_href %}index.html{% endblock %}" class="header-title">{{ marketplace.name }}</a>
            <div class="header-actions">
                {% if marketplace.repository_url %}
                <a href="{{ marketplace.repository_url }}" class="header-github" target="_blank" rel="noopener" aria-label="GitHub repository">
                    <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
                </a>
                {% endif %}
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
                    <span class="theme-icon-light">&#9790;</span>
                    <span class="theme-icon-dark">&#9728;</span>
                </button>
            </div>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <p>&copy; {{ marketplace.owner.name }}{% if marketplace.owner.email %} &mdash; {{ marketplace.owner.email }}{% endif %}</p>
            <p class="footer-powered">Powered by <a href="https://github.com/giginet/cc-plugin-catalog">cc-plugin-catalog</a></p>
        </div>
    </footer>

    <script src="{% block js_path %}static/theme.js{% endblock %}"></script>
</body>
</html>
