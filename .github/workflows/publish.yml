name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - name: Build package
        run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  update-major-tag:
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Update major version tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          # Extract major version (v1.2.3 -> v1, 1.2.3 -> v1, v0.0.1 -> v0)
          VERSION="$(echo "$TAG" | sed 's/^v//')"
          MAJOR_NUM="$(echo "$VERSION" | cut -d. -f1)"
          if ! echo "$MAJOR_NUM" | grep -qE '^[0-9]+$'; then
            echo "Tag '$TAG' does not match a semver format, skipping."
            exit 0
          fi
          MAJOR="v${MAJOR_NUM}"
          echo "Moving tag $MAJOR to $TAG"
          git tag -f "$MAJOR" "$TAG"
          git push -f origin "$MAJOR"
