name: Build and Deploy Plugin Catalog
on:
  workflow_call:
    inputs:
      catalog-ref:
        type: string
        default: ""
        description: "Install cc-plugin-catalog from a git ref (branch, tag, or SHA) instead of PyPI"
      output-dir:
        type: string
        default: "_site"
        description: "Output directory for generated files"
      base-url:
        type: string
        default: ""
        description: "Base URL for OGP meta tags (e.g. https://example.github.io/my-marketplace)"
      logo:
        type: string
        default: ""
        description: "Path to a logo image in the repository (e.g. assets/logo.png)"
      marketplace-repository:
        type: string
        default: ""
        description: "Marketplace repo identifier for install commands (e.g. owner/repo). Auto-detected from git remote if not set."
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    container:
      image: python:3.12-slim
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - name: Install git
        if: inputs.catalog-ref != ''
        run: apt-get update -qq && apt-get install -y -qq git > /dev/null
      - name: Install cc-plugin-catalog
        run: pip install --quiet ${{ inputs.catalog-ref && format('git+https://github.com/giginet/cc-plugin-catalog@{0}', inputs.catalog-ref) || 'cc-plugin-catalog' }}
      - name: Build site
        run: cc-plugin-catalog build . -o ${{ inputs.output-dir }}${{ inputs.base-url && format(' --base-url {0}', inputs.base-url) || '' }}${{ inputs.logo && format(' --logo {0}', inputs.logo) || '' }}${{ inputs.marketplace-repository && format(' --marketplace-repository {0}', inputs.marketplace-repository) || '' }}
      - uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ inputs.output-dir }}
      - id: deployment
        uses: actions/deploy-pages@v5
