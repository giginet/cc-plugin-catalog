name: Build and Deploy Plugin Catalog
on:
  workflow_call:
    inputs:
      python-version:
        type: string
        default: "3.12"
      catalog-version:
        type: string
        default: ""
      output-dir:
        type: string
        default: "_site"
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install cc-plugin-catalog
        run: uv tool install cc-plugin-catalog
      - name: Build site
        run: cc-plugin-catalog build . -o ${{ inputs.output-dir }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ inputs.output-dir }}
      - id: deployment
        uses: actions/deploy-pages@v4
