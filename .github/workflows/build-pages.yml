name: Build and Deploy Plugin Catalog
on:
  workflow_call:
    inputs:
      catalog-version:
        type: string
        default: ""
        description: "cc-plugin-catalog version to install (empty = latest)"
      output-dir:
        type: string
        default: "_site"
        description: "Output directory for generated files"
      base-url:
        type: string
        default: ""
        description: "Base URL for OGP meta tags (e.g. https://example.github.io/my-marketplace)"
      logo:
        type: string
        default: ""
        description: "Path to a logo image in the repository (e.g. assets/logo.png)"
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    container:
      image: python:3.12-slim
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Install cc-plugin-catalog
        run: pip install --quiet cc-plugin-catalog${{ inputs.catalog-version && format('=={0}', inputs.catalog-version) || '' }}
      - name: Build site
        run: cc-plugin-catalog build . -o ${{ inputs.output-dir }}${{ inputs.base-url && format(' --base-url {0}', inputs.base-url) || '' }}${{ inputs.logo && format(' --logo {0}', inputs.logo) || '' }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ inputs.output-dir }}
      - id: deployment
        uses: actions/deploy-pages@v4
